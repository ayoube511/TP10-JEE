<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Accès refusé - 403</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 430px;
        }
        .icon { font-size: 60px; margin-bottom: 15px; }
        h2 { color: #e74c3c; margin-bottom: 15px; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; font-size: 15px; }
        a.btn {
            display: inline-block;
            padding: 10px 25px;
            background: #2b5797;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }
        a.btn:hover { background: #1e3f6e; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🚫</div>
        <h2>Accès refusé — 403</h2>
        <p>
            Tu n'as pas les droits nécessaires pour accéder à cette page.<br>
            Connecté en tant que : <strong sec:authentication="name">Utilisateur</strong>
        </p>
        <a href="/home" class="btn">🏠 Retour à l'accueil</a>
    </div>
</body>
</html>
